services:
  searchx:
    build:
      context: .
      args:
        NODE_IMAGE: ${NODE_IMAGE:-node:22-bookworm-slim}
        RUNTIME_IMAGE: ${RUNTIME_IMAGE:-node:22-bookworm-slim}
        APT_MIRROR: ${APT_MIRROR:-}
        BUILD_APT_PACKAGES: ${BUILD_APT_PACKAGES-ca-certificates cmake g++ make python3}
        RUNTIME_APT_PACKAGES: ${RUNTIME_APT_PACKAGES-ca-certificates curl ffmpeg fonts-noto-cjk libmagic1 libreoffice-calc libreoffice-impress libreoffice-writer poppler-utils python3 python3-venv tesseract-ocr tesseract-ocr-chi-sim tini}
        NPM_BUILD_FROM_SOURCE: ${NPM_BUILD_FROM_SOURCE:-0}
        NPM_REGISTRY: ${NPM_REGISTRY:-}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-}
        INSTALL_DOCLING: ${INSTALL_DOCLING:-0}
    image: searchx:local
    container_name: searchx
    restart: unless-stopped
    ports:
      - "${SEARCHX_PORT:-7310}:7310"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      SEARCHX_HOST: 0.0.0.0
      SEARCHX_PORT: 7310
      SEARCHX_DATA_DIR: /app/.searchx
      XDG_CACHE_HOME: /app/.searchx/cache
      SEARCHX_PYTHON: /opt/searchx-venv/bin/python
      SEARCHX_MARKITDOWN_PLUGINS: ${SEARCHX_MARKITDOWN_PLUGINS:-1}
      SEARCHX_MARKITDOWN_ARCHIVES: ${SEARCHX_MARKITDOWN_ARCHIVES:-1}
      SEARCHX_MARKITDOWN_MEDIA: ${SEARCHX_MARKITDOWN_MEDIA:-1}
      SEARCHX_QMD_EMBED_ON_INGEST: ${SEARCHX_QMD_EMBED_ON_INGEST:-1}
      SEARCHX_QMD_CHUNK_STRATEGY: ${SEARCHX_QMD_CHUNK_STRATEGY:-auto}
      SEARCHX_QMD_UPDATE_TIMEOUT_MS: ${SEARCHX_QMD_UPDATE_TIMEOUT_MS:-120000}
      SEARCHX_QMD_EMBED_TIMEOUT_MS: ${SEARCHX_QMD_EMBED_TIMEOUT_MS:-1800000}
      SEARCHX_DEEP_SEARCH_TIMEOUT_MS: ${SEARCHX_DEEP_SEARCH_TIMEOUT_MS:-30000}
      SEARCHX_DEEP_SEARCH_CANDIDATE_LIMIT: ${SEARCHX_DEEP_SEARCH_CANDIDATE_LIMIT:-16}
      SEARCHX_ALLOW_RAW_FILE_ACCESS: ${SEARCHX_ALLOW_RAW_FILE_ACCESS:-0}
      QMD_FORCE_CPU: ${QMD_FORCE_CPU:-1}
      QMD_LLAMA_GPU: ${QMD_LLAMA_GPU:-false}
      QMD_EMBED_MODEL: ${QMD_EMBED_MODEL:-}
      QMD_RERANK_MODEL: ${QMD_RERANK_MODEL:-}
      QMD_GENERATE_MODEL: ${QMD_GENERATE_MODEL:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      SEARCHX_LLM_MODEL: ${SEARCHX_LLM_MODEL:-}
      SEARCHX_MARKITDOWN_USE_LLM: ${SEARCHX_MARKITDOWN_USE_LLM:-}
      SEARCHX_DOCLING_ENABLED: ${SEARCHX_DOCLING_ENABLED:-0}
      SEARCHX_DOCLING_PYTHON: /opt/searchx-venv/bin/python
      DOCLING_DEVICE: ${DOCLING_DEVICE:-cpu}
      DOCLING_NUM_THREADS: ${DOCLING_NUM_THREADS:-4}
    volumes:
      - ${SEARCHX_STATE_DIR:-./searchx-data}:/app/.searchx
      - ${SEARCHX_FILES_DIR:-./sample-data}:/data:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:7310/api/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 3
